<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="admin.css">
</head>
<body>

  <!-- Blue gradient background -->
  <div class="bg"></div>

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-avatar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2">
      </svg>
    </div>
    <span class="topbar-title">Title.</span>
  </header>

  <!-- Main page -->
  <main class="page">
    <div class="card">

      <!-- Centered blue circle (sits behind globe + form via z-index) -->
      <div class="big-circle"></div>

      <!-- Globe / gear icon -->
      <div class="globe-wrap">
        <svg width="132" height="132" viewBox="0 0 136 136" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- 8 anchor dots -->
          <circle cx="68"  cy="10"  r="6" fill="#111"/>
          <circle cx="68"  cy="126" r="6" fill="#111"/>
          <circle cx="10"  cy="68"  r="6" fill="#111"/>
          <circle cx="126" cy="68"  r="6" fill="#111"/>
          <circle cx="28"  cy="28"  r="6" fill="#111"/>
          <circle cx="108" cy="28"  r="6" fill="#111"/>
          <circle cx="28"  cy="108" r="6" fill="#111"/>
          <circle cx="108" cy="108" r="6" fill="#111"/>
          <!-- spokes -->
          <line x1="68"  y1="16"  x2="68"  y2="32"  stroke="#111" stroke-width="3"/>
          <line x1="68"  y1="120" x2="68"  y2="104" stroke="#111" stroke-width="3"/>
          <line x1="16"  y1="68"  x2="32"  y2="68"  stroke="#111" stroke-width="3"/>
          <line x1="120" y1="68"  x2="104" y2="68"  stroke="#111" stroke-width="3"/>
          <line x1="32"  y1="32"  x2="43"  y2="43"  stroke="#111" stroke-width="3"/>
          <line x1="104" y1="32"  x2="93"  y2="43"  stroke="#111" stroke-width="3"/>
          <line x1="32"  y1="104" x2="43"  y2="93"  stroke="#111" stroke-width="3"/>
          <line x1="104" y1="104" x2="93"  y2="93"  stroke="#111" stroke-width="3"/>
          <!-- outer ring -->
          <circle cx="68" cy="68" r="36" stroke="#111" stroke-width="3.2" fill="rgba(255,255,255,0.06)"/>
          <!-- globe lines -->
          <ellipse cx="68" cy="68" rx="36" ry="14" stroke="#111" stroke-width="2.2" fill="none"/>
          <ellipse cx="68" cy="68" rx="14" ry="36" stroke="#111" stroke-width="2.2" fill="none"/>
          <line x1="32" y1="68" x2="104" y2="68" stroke="#111" stroke-width="2.2"/>
        </svg>
      </div>

      <!-- Login form -->
      <div class="form-box">

        <div class="field-label">Email</div>
        <div class="input-wrap">
          <input type="text" id="email" autocomplete="email"/>
        </div>

        <div class="field-label">Password</div>
        <div class="input-wrap">
          <input type="password" id="password" autocomplete="current-password"/>
          <button class="eye-btn" onclick="togglePw()" aria-label="Toggle password visibility">
            <svg id="eye-icon" width="19" height="19" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12S5 5 12 5s11 7 11 7-4 7-11 7S1 12 1 12z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>

        <div class="remember-row">
          <input type="checkbox" id="remember"/>
          <span>Remember Me</span>
        </div>

        <button class="btn-login" onclick="window.location='dashboard-admin.html'">
          Log In
        </button>

      </div>
    </div>
  </main>

  <script>
    function togglePw() {
      const inp  = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.innerHTML =
          `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8
            a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4
            c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
           <line x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        inp.type = 'password';
        icon.innerHTML =
          `<path d="M1 12S5 5 12 5s11 7 11 7-4 7-11 7S1 12 1 12z"/>
           <circle cx="12" cy="12" r="3"/>`;
      }
    }
  </script>

</body>
</html>
</body>
</html>

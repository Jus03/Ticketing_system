<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Dashboard – Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="dashboard.css"/>
</head>
<body>

  <!-- ── Orb background ── -->
  <div class="orb-scene">
    <div class="orb o-center"></div>
    <div class="orb o-wh-lg"></div>
    <div class="orb o-teal-md"></div>
    <div class="orb o-wh-sm"></div>
    <div class="orb o-teal-sm"></div>
    <div class="orb o-teal-bot"></div>
    <div class="orb o-tiny"></div>
    <div class="orb o-blue-big"></div>
  </div>

  <!-- ── Page layout ── -->
  <div class="layout">

    <!-- Top row -->
    <div class="top-row">

      <!-- 4 Stat cards -->
      <div class="stat-cards">
        <div class="stat-card">Var</div>
        <div class="stat-card">Var</div>
        <div class="stat-card">Var</div>
        <div class="stat-card">Var</div>
      </div>

      <!-- Unresolved tickets panel -->
      <div class="unresolved-panel">
        <div class="panel-title">Unresolved tickets</div>
        <div class="unresolved-grid">
          <div class="u-cell">Var</div>
          <div class="u-cell">Var</div>
          <div class="u-cell">Var</div>
          <div class="u-cell">Var</div>
        </div>
      </div>

      <!-- Profile card -->
      <div class="profile-card">
        <button class="prof-ham" aria-label="Menu">&#9776;</button>

        <div class="prof-avatar">
          <svg width="22" height="22" viewBox="0 0 24 24"
               fill="none" stroke="#fff" stroke-width="2.2">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>

        <div class="prof-name">Profile</div>

        <button class="prof-btn">Text</button>
        <button class="prof-btn">Text</button>

        <button class="prof-logout"
                onclick="window.location='login-admin.html'"
                aria-label="Log out">
          <svg width="17" height="17" viewBox="0 0 24 24"
               fill="none" stroke="#2a2a4a" stroke-width="2.2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>

    </div><!-- /top-row -->

    <!-- Bottom — Recent Tickets -->
    <div class="bottom-section">

      <div class="section-row">
        <span class="section-title">Recent Tickets</span>
        <button class="add-btn" onclick="addTicket()">
          <svg width="18" height="18" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8"  x2="12" y2="16"/>
            <line x1="8"  y1="12" x2="16" y2="12"/>
          </svg>
          Add new ticket
        </button>
      </div>

      <div class="tickets-panel">
        <table>
          <thead>
            <tr>
              <th></th>
              <th>Text</th>
              <th>Text</th>
              <th>Text</th>
              <th>Text</th>
              <th>Text</th>
            </tr>
          </thead>
          <tbody id="ticket-body">
            <tr>
              <td><input type="checkbox"/></td>
              <td>Ticket #001</td>
              <td>Network issue</td>
              <td>Open</td>
              <td>High</td>
              <td>Today</td>
            </tr>
            <tr>
              <td><input type="checkbox"/></td>
              <td>Ticket #002</td>
              <td>Login failure</td>
              <td>Pending</td>
              <td>Medium</td>
              <td>Yesterday</td>
            </tr>
            <tr>
              <td><input type="checkbox"/></td>
              <td>Ticket #003</td>
              <td>Slow response</td>
              <td>Resolved</td>
              <td>Low</td>
              <td>2 days ago</td>
            </tr>
          </tbody>
        </table>
      </div>

    </div><!-- /bottom-section -->

  </div><!-- /layout -->

  <script>
    let ticketCount = 3;

    function addTicket() {
      ticketCount++;
      const tbody = document.getElementById('ticket-body');
      const row   = document.createElement('tr');
      row.style.animation = 'fade-up 0.4s cubic-bezier(0.22,1,0.36,1) both';
      row.innerHTML = `
        <td><input type="checkbox"/></td>
        <td>Ticket #00${ticketCount}</td>
        <td>New issue</td>
        <td>Open</td>
        <td>Medium</td>
        <td>Just now</td>
      `;
      tbody.appendChild(row);
    }
  </script>

</body>
</html>

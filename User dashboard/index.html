<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Poppins:wght@700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="viewport">
      <div class="orb-scene">
        <div class="orb o-center"></div>
        <div class="orb o-wh-lg"></div>
        <div class="orb o-teal-md"></div>
        <div class="orb o-wh-sm"></div>
        <div class="orb o-teal-sm"></div>
        <div class="orb o-teal-bot"></div>
        <div class="orb o-tiny"></div>
      </div>

      <button class="sb-ham" aria-label="Menu">&#9776;</button>

      <aside class="sidebar">
        <div class="sb-avatar" id="avatarBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
          </svg>
        </div>

        <button class="nav-btn">Get a ticket</button>
        <button class="nav-btn">Billing Statement</button>
        <button class="nav-btn">Upgrade Plan</button>

        <div class="sb-spacer"></div>

        <button class="logout-btn" id="logoutBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Log out
        </button>
      </aside>

      <main class="main">
        <div class="hero-sub">Encountering problems with your internet connectivity?</div>
        <div class="hero-main">
          We are here to fix it.
          <span class="hero-arrow">&#8594;</span>
        </div>
        <button class="apply-btn" id="applyBtn">Apply</button>
      </main>
    </div>

    <script>
      const sidebarEl = document.querySelector('.sidebar');
      const hamBtnEl = document.querySelector('.sb-ham');
      const logoutBtnEl = document.getElementById('logoutBtn');
      const avatarEl = document.getElementById('avatarBtn');
      const applyBtnEl = document.getElementById('applyBtn');
      const navBtns = document.querySelectorAll('.nav-btn');

      // 1. Toggle Sidebar
      hamBtnEl.addEventListener('click', (e) => {
        e.stopPropagation();
        sidebarEl.classList.toggle('active');
      });

      // 2. Navigation
      navBtns.forEach((btn) => {
        btn.addEventListener('click', function () {
          navBtns.forEach((b) => b.classList.remove('active'));
          this.classList.add('active');
        });
      });

      // 3. Redirects
      avatarEl.addEventListener('click', () => {
        window.location.href = 'deals.html';
      });
      applyBtnEl.addEventListener('click', () => {
        window.location.href = 'deals.html';
      });

      // 4. Logout
      logoutBtnEl.addEventListener('click', () => {
        alert('Logging out...');
        window.location.href = '/logout.php';
      });

      // 5. Close sidebar if clicking outside
      document.addEventListener('click', (event) => {
        if (
          sidebarEl.classList.contains('active') &&
          !sidebarEl.contains(event.target) &&
          !hamBtnEl.contains(event.target)
        ) {
          sidebarEl.classList.remove('active');
        }
      });
    </script>
  </body>
</html>
